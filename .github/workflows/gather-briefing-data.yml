name: Gather Briefing Data

on:
  schedule:
    - cron: '0 10 * * *'  # 10:00 UTC = 4:00am MDT (runs early to ensure data is ready before briefing)
  workflow_dispatch:

jobs:
  gather:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Sync Rachio waterings to Supabase
        run: |
          curl -sf -X POST \
            "https://ulivctyuudgepolulpvq.supabase.co/functions/v1/sync-rachio-waterings" \
            -H "Content-Type: application/json" || echo "Rachio sync failed (non-fatal)"

      - name: Fetch garden data and weather
        run: |
          SB_URL="https://ulivctyuudgepolulpvq.supabase.co"
          SB_KEY="sb_publishable_oLwWliy_016RY0abQAcglA_6seSqdx2"
          TODAY=$(date -u +%Y-%m-%d)
          SEVEN_AGO=$(date -u -d "7 days ago" +%Y-%m-%d)
          FOURTEEN_AGO=$(date -u -d "14 days ago" +%Y-%m-%d)

          curl -sf -H "apikey: $SB_KEY" -H "Authorization: Bearer $SB_KEY" \
            "$SB_URL/rest/v1/plantings?planting_state=eq.active&select=id,bed_id,crop_name,variety,planted_date,status,expected_harvest,season_notes" \
            > /tmp/plantings.json &

          # All open tasks including description — used for surfacing timely existing tasks
          curl -sf -H "apikey: $SB_KEY" -H "Authorization: Bearer $SB_KEY" \
            "$SB_URL/rest/v1/tasks?completed_date=is.null&order=due_date&select=id,planting_id,title,description,due_date" \
            > /tmp/tasks.json &

          curl -sf -H "apikey: $SB_KEY" -H "Authorization: Bearer $SB_KEY" \
            "$SB_URL/rest/v1/logs?date=gte.$SEVEN_AGO&order=date.desc&select=planting_id,date,note" \
            > /tmp/logs.json &

          curl -sf -H "apikey: $SB_KEY" -H "Authorization: Bearer $SB_KEY" \
            "$SB_URL/rest/v1/harvests?harvest_date=gte.$FOURTEEN_AGO&select=planting_id,harvest_date,amount,unit" \
            > /tmp/harvests.json &

          curl -sf -H "apikey: $SB_KEY" -H "Authorization: Bearer $SB_KEY" \
            "$SB_URL/rest/v1/waterings?order=watered_date.desc&limit=10&select=zone,watered_date,duration_minutes" \
            > /tmp/waterings.json &

          # Last 14 days of briefings with accept/reject feedback
          curl -sf -H "apikey: $SB_KEY" -H "Authorization: Bearer $SB_KEY" \
            "$SB_URL/rest/v1/briefings?order=generated_at.desc&limit=14&select=payload,suggestions_state,generated_at" \
            > /tmp/briefing_history.json &

          wait

          FORECAST_URL=$(curl -sf -H "User-Agent: GardenTracker/1.0" \
            "https://api.weather.gov/points/40.6916,-111.9391" | jq -r '.properties.forecast')

          curl -sf -H "User-Agent: GardenTracker/1.0" "$FORECAST_URL" > /tmp/forecast.json &
          curl -sf -H "User-Agent: GardenTracker/1.0" \
            "https://api.weather.gov/alerts/active?point=40.6916,-111.9391" > /tmp/alerts.json &
          # Historical daily precip/temps from Open-Meteo — gridded to actual coordinates, not a distant station
          curl -sf \
            "https://archive-api.open-meteo.com/v1/archive?latitude=40.6916&longitude=-111.9391&start_date=${SEVEN_AGO}&end_date=${TODAY}&daily=precipitation_sum,temperature_2m_max,temperature_2m_min&timezone=America%2FDenver" \
            > /tmp/observations.json || echo '{"daily":{"time":[],"precipitation_sum":[],"temperature_2m_max":[],"temperature_2m_min":[]}}' > /tmp/observations.json &

          wait

          jq -n \
            --arg today "$TODAY" \
            --slurpfile plantings /tmp/plantings.json \
            --slurpfile tasks /tmp/tasks.json \
            --slurpfile logs /tmp/logs.json \
            --slurpfile harvests /tmp/harvests.json \
            --slurpfile waterings /tmp/waterings.json \
            --slurpfile forecast /tmp/forecast.json \
            --slurpfile alerts /tmp/alerts.json \
            --slurpfile briefing_history /tmp/briefing_history.json \
            --slurpfile observations /tmp/observations.json \
            '{
              today: $today,
              plantings: $plantings[0],
              tasks: $tasks[0],
              logs: $logs[0],
              harvests: $harvests[0],
              waterings: $waterings[0],
              weather: {
                forecast: ($forecast[0].properties.periods // [] | .[0:7]),
                alerts: [$alerts[0].features // [] | .[0:3][] | .properties.headline],
                past_7_days: (
                  [$observations[0].daily.time // [],
                   $observations[0].daily.precipitation_sum // [],
                   $observations[0].daily.temperature_2m_max // [],
                   $observations[0].daily.temperature_2m_min // []] |
                  transpose |
                  map({
                    date: .[0],
                    precip_in: (.[1] // 0 | . / 25.4 * 100 | round | . / 100),
                    high_f: (.[2] // null | if . != null then (. * 9/5 + 32 | round) else null end),
                    low_f: (.[3] // null | if . != null then (. * 9/5 + 32 | round) else null end)
                  })
                )
              },
              recent_briefings: $briefing_history[0]
            }' > briefing-data/input.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add briefing-data/input.json
          git diff --staged --quiet || git commit -m "chore: gather briefing data $(date -u +%Y-%m-%d)"
          git push
